<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Maps</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f9f9f9;
        }
        h1 {
            color: #111;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }
        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            .card-container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
            border-color: #0366d6;
        }
        .card h3 {
            margin-top: 0;
            color: #0366d6;
        }
        .card p {
            margin-bottom: 0;
            color: #586069;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <h1>Interactive Maps</h1>
    <p>Analytical Study of Peruvian Solid Waste (2014–2024).</p>

    <div class="card-container">
        <!-- Card for Map 1 -->
        <a href="waste_arequipa.html" target="_blank" class="card">
            <h3>Arequipa Map</h3>
            <p></p>
        </a>

        <!-- Card for Map 2 -->
        <a href="waste_lima.html" target="_blank" class="card">
            <h3>Lima Map</h3>
            <p></p>
        </a>
    </div>

</body>
</html>
